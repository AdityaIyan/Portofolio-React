version: "3.8"
services:
  mysql:
    image: mysql:8.0
    container_name: mysql-replica
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: symdb
      MYSQL_USER: symuser
      MYSQL_PASSWORD: sympass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  oracle:
    image: gvenzl/oracle-xe:18-slim
    container_name: oracle-db
    environment:
      - ORACLE_PASSWORD=OraclePass123
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata

  symmetricds:
    image: jumpmind/symmetric
    container_name: symmetricds
    depends_on:
      - mysql
      - oracle
    environment:
      - SYMMETRIC_ENGINE_NAME=engine1
    ports:
      - "31415:31415"
    volumes:
      - ./conf:/opt/symmetric/conf

volumes:
  mysql_data:
  oracle_data:
